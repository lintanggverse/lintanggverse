name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: lintanggverse
          outputs: |
              dist/github-contribution-grid-snake.svg?color_snake=%2300E5FF
              dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2300E5FF
              dist/ocean.gif?color_snake=%2300E5FF&color_dots=%23161B22,%230D1117,%230096FF,%2300E5FF,%23FFFFFF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
